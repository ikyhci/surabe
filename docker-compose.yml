# version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: fikridulumina/php:8.3-fpm-alpine3.21
    container_name: ${APPNAME}_app
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      - mariadb
      - redis

  nginx:
    image: nginx:latest
    container_name: ${APPNAME}_nginx
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mariadb:
    image: mariadb:latest
    container_name: ${APPNAME}_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/my.cnf

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ${APPNAME}_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb

  redis:
    image: redis:latest
    container_name: ${APPNAME}_redis

volumes:
  mariadb_data:
