  app:
    # image: php:8.3-apache
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile.php8.3-apache
    image: fikridulumina/php:8.3-apache
    # container_name: ${APPNAME}_app_
    volumes:
      - .:/var/www/html
      - ./docker/apache/default.conf:/etc/apache2/sites-enabled/000-default.conf
    ports:
      - 7890:80
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      - mariadb
      - redis
    labels:
      - custom.domain=${APPNAME}.localhost
    # deploy:
    #   replicas: 2
    #   resources:
    #     limits:
    #       cpus: "0.1"
    #       memory: 50M
    #     reservations:
    #       cpus: "0.05"
    #       memory: 20M

  mariadb:
    # image: mariadb:latest
    image: mysql:8.0.40-debian
    container_name: ${APPNAME}_mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - '.:/app'
      - mariadb_data:/var/lib/mysql
      # - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    command: [
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--log-bin-trust-function-creators=1"
    ]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ${APPNAME}_phpmyadmin
    ports:
      - "7891:80"
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb
    labels:
      - custom.domain=phpmyadmin.${APPNAME}.localhost

  redis:
    image: redis:latest
    container_name: ${APPNAME}_redis

volumes:
  mariadb_data:
